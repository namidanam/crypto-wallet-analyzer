name: CI — Group 24 Crypto Wallet Analyzer

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:
jobs:

  # ────────────────────────────────────────────────
  # JOB 1: Python server — lint + unit tests
  # ────────────────────────────────────────────────
  python-tests:
    name: Python — Lint & Unit Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: python-server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: python-server/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov

      - name: Lint with flake8
        run: |
          pip install flake8
          # Stop on syntax errors or undefined names (E9, F8xx)
          flake8 app/ --count --select=E9,F821,F822,F823 --show-source --statistics
          # Warn on style issues but don't fail the build
          flake8 app/ --count --exit-zero --max-line-length=120 --statistics

      - name: Run unit tests with coverage
        env:
          # Mongo URI points to nothing in unit tests — DB calls are mocked
          MONGO_URI: mongodb://localhost:27017/test
          DB_NAME: test
          PYTHONPATH: .
        run: |
          pytest tests/test_normalize.py tests/test_risk_engine.py \
            -v \
            --tb=short \
            --cov=app/processors \
            --cov-report=term-missing \
            --cov-fail-under=70

  # ────────────────────────────────────────────────
  # JOB 2: Node.js server — lint + Jest tests
  # ────────────────────────────────────────────────
  node-tests:
    name: Node.js — Lint & Jest Tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Jest tests
        env:
          NODE_ENV: test
          GOLDRUSH_API_KEY: test-key
          TATUM_API_KEY: test-key
          JWT_SECRET: test-secret
          MONGO_URI: mongodb://localhost:27017/test
        run: npm test -- --forceExit --passWithNoTests

  # ────────────────────────────────────────────────
  # JOB 3: Docker Compose — integration health check
  # Spins up backend + python containers and checks /health endpoints
  # ────────────────────────────────────────────────
  docker-integration:
    name: Docker — Container Health Check
    runs-on: ubuntu-latest
    needs: [python-tests, node-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file for compose
        run: |
          cat <<EOF > .env
          MONGO_URI=${{ secrets.MONGO_URI || 'mongodb://example.invalid:27017/wallet-sync' }}
          DB_NAME=wallet-sync
          PYTHON_SERVER_URL=http://python-server:8000
          GOLDRUSH_API_KEY=${{ secrets.GOLDRUSH_API_KEY || 'ci-placeholder' }}
          TATUM_API_KEY=${{ secrets.TATUM_API_KEY || 'ci-placeholder' }}
          JWT_SECRET=${{ secrets.JWT_SECRET || 'ci-test-secret-do-not-use' }}
          EOF

      - name: Build and start containers
        run: docker compose up -d --build python-server backend

      - name: Wait for Python server /health
        run: |
          echo "Waiting for Python server..."
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8001/health > /dev/null 2>&1; then
              echo "Python server is ready."
              break
            fi
            echo "  attempt $i/20 — retrying in 5s"
            sleep 5
          done

      - name: Wait for Node.js server /health
        run: |
          echo "Waiting for Node.js server..."
          for i in $(seq 1 20); do
            if curl -sf http://localhost:5001/health > /dev/null 2>&1; then
              echo "Node.js server is ready."
              break
            fi
            echo "  attempt $i/20 — retrying in 5s"
            sleep 5
          done

      - name: Assert Python /health returns healthy
        run: |
          RESPONSE=$(curl -sf http://localhost:8001/health)
          echo "Response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"healthy"'

      - name: Assert Node.js /health returns 200
        run: |
          STATUS=$(curl -o /dev/null -sw "%{http_code}" http://localhost:5001/health)
          echo "Status: $STATUS"
          [ "$STATUS" = "200" ]

      - name: Print container logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down containers
        if: always()
        run: docker compose down -v
