services:
  # ==========================================
  # Python Processing Server
  # ==========================================
  python-server:
    build:
      context: ./python-server
      dockerfile: Dockerfile
    container_name: crypto-wallet-python
    restart: always
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=${MONGO_URI:?Set MONGO_URI in .env (MongoDB Atlas connection string)}
      - DB_NAME=${DB_NAME:-wallet-sync}
      - LOG_LEVEL=info
    volumes:
      - ./python-server/app:/app/app
    networks:
      - crypto-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ==========================================
  # Node.js Backend API
  # ==========================================
  backend:
    build:
      context: ./node-server
      dockerfile: Dockerfile
    container_name: crypto-wallet-backend
    restart: always
    ports:
      - "4000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=${MONGO_URI:?Set MONGO_URI in .env (MongoDB Atlas connection string)}
      - DB_NAME=${DB_NAME:-wallet-sync}
      - PYTHON_SERVER_URL=http://python-server:8000
      - GOLDRUSH_API_KEY=${GOLDRUSH_API_KEY:-}
      - TATUM_API_KEY=${TATUM_API_KEY:-}
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-me}
    volumes:
      - ./node-server/src:/app/src
    depends_on:
      python-server:
        condition: service_healthy
    networks:
      - crypto-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ==========================================
  # React Frontend
  # ==========================================
  frontend:
    profiles: ["frontend"]
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: crypto-wallet-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - crypto-network
    volumes:
      - ./frontend/src:/app/src
      - /app/node_modules

# ==========================================
# Networks
# ==========================================
networks:
  crypto-network:
    driver: bridge
